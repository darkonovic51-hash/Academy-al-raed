<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>لوحة تحكم المسؤول | أكاديمية الرائد</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            background: #0D1A0D;
            color: #E8F0E8;
            direction: rtl;
            overflow-x: hidden;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* ===== شاشة تسجيل الدخول ===== */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0A2F1A, #0D3B26);
        }
        .login-box {
            background: rgba(20, 40, 25, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 50px;
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(212, 160, 23, 0.3);
            text-align: center;
        }
        .login-box h1 { font-size: 2rem; color: #FFE7B0; margin-bottom: 10px; }
        .login-box .sub { color: var(--gray-light); opacity: 0.7; margin-bottom: 30px; }
        .login-box input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: #FFFFFF;
            font-size: 1rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .login-box input:focus { border-color: var(--gold); outline: none; }
        .login-box .btn-gold {
            background: linear-gradient(135deg, #D4A017, #F5A623);
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            color: #0D1A0D;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            transition: 0.2s;
        }
        .login-box .btn-gold:hover { transform: translateY(-2px); }
        .login-error { color: #ff6b6b; margin-top: 15px; display: none; }

        /* ===== لوحة التحكم ===== */
        .dashboard { display: none; }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap;
            gap: 15px;
        }
        .admin-header h2 { color: #FFE7B0; }
        .admin-header .logout-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: #ff6b6b;
            cursor: pointer;
            transition: 0.2s;
        }
        .admin-header .logout-btn:hover { background: rgba(255,0,0,0.2); }

        /* إحصائيات سريعة */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: rgba(20, 40, 25, 0.7);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(0, 115, 63, 0.2);
        }
        .stat-card .number { font-size: 2.2rem; font-weight: 800; color: #D4A017; }
        .stat-card .label { font-size: 0.85rem; color: var(--gray-light); opacity: 0.7; }

        /* أقسام التعديل */
        .section-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 30px 0 20px;
        }
        .section-tabs button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 22px;
            border-radius: 50px;
            color: #E8F0E8;
            cursor: pointer;
            transition: 0.2s;
        }
        .section-tabs button.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        .section-tabs button:hover { background: rgba(255,255,255,0.1); }

        .section-content { display: none; }
        .section-content.active { display: block; }

        /* بطاقات التعديل */
        .edit-card {
            background: rgba(20, 40, 25, 0.6);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .edit-card h3 { color: #FFE7B0; margin-bottom: 15px; }
        .edit-card .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .edit-card .full-row { grid-column: 1 / -1; }
        .edit-card label { display: block; font-size: 0.8rem; color: var(--gray-light); margin-bottom: 5px; }
        .edit-card input, .edit-card textarea, .edit-card select {
            width: 100%;
            padding: 10px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: #FFFFFF;
            font-size: 0.95rem;
        }
        .edit-card input:focus, .edit-card textarea:focus { border-color: #D4A017; outline: none; }
        .edit-card textarea { min-height: 80px; resize: vertical; }
        .btn-save {
            background: var(--primary);
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            color: #FFFFFF;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }
        .btn-save:hover { background: var(--primary-dark); }
        .btn-danger {
            background: #8B0000;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            color: #FFFFFF;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }
        .btn-danger:hover { background: #a00000; }
        .btn-export {
            background: #2c3e66;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            color: #FFFFFF;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        /* قائمة العناصر القابلة للتعديل */
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .item-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 12px 18px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .item-entry .info { flex: 1; }
        .item-entry .info .title { font-weight: 600; }
        .item-entry .info .desc { font-size: 0.8rem; opacity: 0.6; }
        .item-entry .actions { display: flex; gap: 8px; }
        .item-entry .actions button {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            color: #E8F0E8;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .item-entry .actions .edit-btn:hover { background: #D4A017; color: #0D1A0D; }
        .item-entry .actions .del-btn:hover { background: #8B0000; }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1f6e43;
            color: #FFFFFF;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: 0.3s;
            z-index: 999;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { background: #8B0000; }

        @media (max-width: 750px) {
            .edit-card .row { grid-template-columns: 1fr; }
            .login-box { padding: 30px 25px; }
            .admin-header { flex-direction: column; text-align: center; }
            .section-tabs { justify-content: center; }
        }
    </style>
</head>
<body>

<!-- ===== شاشة تسجيل الدخول ===== -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <i class="fas fa-lock" style="font-size: 2.5rem; color: #D4A017;"></i>
        <h1>لوحة التحكم</h1>
        <div class="sub">أكاديمية الرائد – إدارة الموقع</div>
        <input type="password" id="adminPassword" placeholder="أدخل الرمز السري" onkeydown="if(event.key==='Enter') login()">
        <button class="btn-gold" onclick="login()">دخول</button>
        <div class="login-error" id="loginError">❌ رمز سري غير صحيح</div>
    </div>
</div>

<!-- ===== لوحة التحكم ===== -->
<div class="dashboard" id="dashboard">
    <div class="container">

        <!-- الهيدر -->
        <div class="admin-header">
            <div>
                <h2><i class="fas fa-cog"></i> لوحة التحكم</h2>
                <small style="opacity:0.6;">أكاديمية الرائد – إدارة المحتوى</small>
            </div>
            <div>
                <button class="btn-export" onclick="exportData()"><i class="fas fa-download"></i> تصدير البيانات</button>
                <button class="btn-danger" onclick="resetData()" style="margin-right:10px;"><i class="fas fa-trash"></i> إعادة تعيين</button>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
            </div>
        </div>

        <!-- إحصائيات سريعة -->
        <div class="stats-grid" id="statsGrid"></div>

        <!-- أقسام التعديل -->
        <div class="section-tabs" id="sectionTabs">
            <button class="active" data-section="schedule">📅 جدول التدريبات</button>
            <button data-section="teams">👕 الفرق</button>
            <button data-section="coaches">🧑‍🏫 المدربون</button>
            <button data-section="news">📰 الأخبار</button>
            <button data-section="gallery">🖼️ المعرض</button>
            <button data-section="settings">⚙️ الإعدادات</button>
        </div>

        <!-- جدول التدريبات -->
        <div class="section-content active" id="sec-schedule">
            <div class="edit-card">
                <h3>📅 جدول التدريبات الأسبوعي</h3>
                <div id="scheduleContainer"></div>
                <button class="btn-save" onclick="addScheduleRow()"><i class="fas fa-plus"></i> إضافة صف</button>
                <button class="btn-save" style="margin-right:10px; background:#2c3e66;" onclick="saveSchedule()"><i class="fas fa-save"></i> حفظ الجدول</button>
            </div>
        </div>

        <!-- الفرق -->
        <div class="section-content" id="sec-teams">
            <div class="edit-card">
                <h3>👕 الفئات العمرية</h3>
                <div id="teamsContainer"></div>
                <button class="btn-save" onclick="addTeam()"><i class="fas fa-plus"></i> إضافة فئة</button>
                <button class="btn-save" style="margin-right:10px; background:#2c3e66;" onclick="saveTeams()"><i class="fas fa-save"></i> حفظ الفرق</button>
            </div>
        </div>

        <!-- المدربون -->
        <div class="section-content" id="sec-coaches">
            <div class="edit-card">
                <h3>🧑‍🏫 المدربون</h3>
                <div id="coachesContainer"></div>
                <button class="btn-save" onclick="addCoach()"><i class="fas fa-plus"></i> إضافة مدرب</button>
                <button class="btn-save" style="margin-right:10px; background:#2c3e66;" onclick="saveCoaches()"><i class="fas fa-save"></i> حفظ المدربين</button>
            </div>
        </div>

        <!-- الأخبار -->
        <div class="section-content" id="sec-news">
            <div class="edit-card">
                <h3>📰 الأخبار</h3>
                <div id="newsContainer"></div>
                <button class="btn-save" onclick="addNews()"><i class="fas fa-plus"></i> إضافة خبر</button>
                <button class="btn-save" style="margin-right:10px; background:#2c3e66;" onclick="saveNews()"><i class="fas fa-save"></i> حفظ الأخبار</button>
            </div>
        </div>

        <!-- المعرض -->
        <div class="section-content" id="sec-gallery">
            <div class="edit-card">
                <h3>🖼️ معرض الصور</h3>
                <div id="galleryContainer"></div>
                <button class="btn-save" onclick="addGalleryItem()"><i class="fas fa-plus"></i> إضافة صورة</button>
                <button class="btn-save" style="margin-right:10px; background:#2c3e66;" onclick="saveGallery()"><i class="fas fa-save"></i> حفظ المعرض</button>
            </div>
        </div>

        <!-- الإعدادات -->
        <div class="section-content" id="sec-settings">
            <div class="edit-card">
                <h3>⚙️ إعدادات الموقع</h3>
                <div class="row">
                    <div><label>اسم الأكاديمية</label><input type="text" id="siteName" value="أكاديمية الرائد"></div>
                    <div><label>الشعار النصي (Tagline)</label><input type="text" id="siteTagline" value="حيث تُصنع النجوم"></div>
                </div>
                <div class="row">
                    <div><label>البريد الإلكتروني</label><input type="email" id="siteEmail" value="info@raedacademy.dz"></div>
                    <div><label>رقم الهاتف</label><input type="text" id="sitePhone" value="07.71.88.47.45"></div>
                </div>
                <div class="row">
                    <div><label>العنوان</label><input type="text" id="siteAddress" value="المركب الرياضي، زرالدة، الجزائر"></div>
                    <div><label>رمز المسؤول</label><input type="text" id="adminCode" value="admin2025"></div>
                </div>
                <button class="btn-save" onclick="saveSettings()"><i class="fas fa-save"></i> حفظ الإعدادات</button>
            </div>
        </div>

    </div>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<script>
    // ===== كلمة المرور =====
    const ADMIN_PASSWORD = 'admin2025';

    // ===== البيانات الافتراضية =====
    const DEFAULT_DATA = {
        schedule: [
            { id: 1, category: 'تحت 16 سنة', sat: '—', sun: '—', tue: '—', thu: '—' },
            { id: 2, category: 'تحت 15 سنة', sat: '—', sun: '—', tue: '—', thu: '—' },
            { id: 3, category: 'تحت 14 سنة', sat: '—', sun: '—', tue: '—', thu: '—' },
            { id: 4, category: 'تحت 13 سنة', sat: '—', sun: '—', tue: '—', thu: '—' },
            { id: 5, category: 'تحت 12 سنة', sat: '—', sun: '—', tue: '—', thu: '—' },
            { id: 6, category: 'تحت 11 سنة', sat: '—', sun: '—', tue: '—', thu: '—' }
        ],
        teams: [
            { id: 1, name: 'تحت 16 سنة', age: '2009', img: 'https://github.com/darkonovic51-hash/Academy-al-raed/raw/f1cc62258d86575c1485195537f9a67e69e09868/1781876420019.jpg' },
            { id: 2, name: 'تحت 13 سنة', age: '2012', img: 'https://github.com/darkonovic51-hash/Academy-al-raed/raw/e06a9457975cfd42c616a9ac86776fde9e05dc6c/1781869894374.jpg' },
            { id: 3, name: 'تحت 11 سنة', age: '2014', img: 'https://github.com/darkonovic51-hash/Academy-al-raed/raw/d6545022df84c4e0f9385c1bb028c4c4164a335a/1781876621648.jpg' }
        ],
        coaches: [
            { id: 1, name: 'المدير الفني', role: 'مدرب وطني معتمد – UEFA B', img: 'https://github.com/darkonovic51-hash/Academy-al-raed/raw/1df27a516344950ef0e2827829f4c77d7e759cac/file_000000007fd871f4b2e095dad086c8e3.png' }
        ],
        news: [
            { id: 1, title: 'الطبعة الثالثة للدورة الوطنية', date: '19 يونيو 2026', content: 'إعلان رسمي عن انطلاق الدورة الوطنية الثالثة لمدارس وأكاديميات كرة القدم.' },
            { id: 2, title: 'تأهل فريق تحت 16 إلى النهائي', date: '15 يونيو 2026', content: 'فريق تحت 16 سنة يتأهل إلى نهائي البطولة الوطنية بعد أداء مميز.' }
        ],
        gallery: [
            { id: 1, title: 'تدريبات الفريق الأول', url: 'https://github.com/darkonovic51-hash/Academy-al-raed/raw/a1e34ad8777a9a65f367bcce4bd78f2464e5b911/1781869815626.jpg' },
            { id: 2, title: 'تمارين تكتيكية', url: 'https://github.com/darkonovic51-hash/Academy-al-raed/raw/081259b9f7cd4d24acf0bed12b69723f81c8ea1b/1781870007660.jpg' },
            { id: 3, title: 'إعداد بدني', url: 'https://github.com/darkonovic51-hash/Academy-al-raed/raw/7189d2e97a0c2688ef550c50c4a1e5da9014f182/1781876690623.jpg' },
            { id: 4, title: 'فريق تحت 13 سنة', url: 'https://github.com/darkonovic51-hash/Academy-al-raed/raw/e06a9457975cfd42c616a9ac86776fde9e05dc6c/1781869894374.jpg' }
        ],
        settings: {
            siteName: 'أكاديمية الرائد',
            tagline: 'حيث تُصنع النجوم',
            email: 'info@raedacademy.dz',
            phone: '07.71.88.47.45',
            address: 'المركب الرياضي، زرالدة، الجزائر',
            adminCode: 'admin2025'
        }
    };

    // ===== تحميل وحفظ البيانات =====
    let appData = JSON.parse(localStorage.getItem('raedAdminData'));
    if (!appData) { appData = JSON.parse(JSON.stringify(DEFAULT_DATA)); saveData(); }

    function saveData() {
        localStorage.setItem('raedAdminData', JSON.stringify(appData));
        updateStats();
    }

    function resetData() {
        if (confirm('⚠️ هل أنت متأكد من إعادة تعيين جميع البيانات إلى الإعدادات الافتراضية؟ سيتم فقدان جميع التعديلات.')) {
            appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
            saveData();
            renderAll();
            showToast('✅ تم إعادة التعيين بنجاح');
        }
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'raed_backup.json';
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('✅ تم تصدير البيانات بنجاح');
    }

    // ===== إحصائيات =====
    function updateStats() {
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="number">${appData.teams.length}</div><div class="label">الفرق</div></div>
            <div class="stat-card"><div class="number">${appData.coaches.length}</div><div class="label">المدربون</div></div>
            <div class="stat-card"><div class="number">${appData.news.length}</div><div class="label">الأخبار</div></div>
            <div class="stat-card"><div class="number">${appData.gallery.length}</div><div class="label">الصور</div></div>
        `;
    }

    // ===== توليد المعرفات =====
    function generateId() { return Date.now() + Math.random() * 1000; }

    // ===== الجدول =====
    function renderSchedule() {
        const container = document.getElementById('scheduleContainer');
        let html = `
            <div style="overflow-x:auto;">
                <table style="width:100%; border-collapse:collapse; font-size:0.85rem;">
                    <thead>
                        <tr style="background:rgba(0,0,0,0.3);">
                            <th style="padding:10px; text-align:center;">الفئة</th>
                            <th style="padding:10px; text-align:center;">السبت</th>
                            <th style="padding:10px; text-align:center;">الأحد</th>
                            <th style="padding:10px; text-align:center;">الثلاثاء</th>
                            <th style="padding:10px; text-align:center;">الخميس</th>
                            <th style="padding:10px; text-align:center;">حذف</th>
                        </tr>
                    </thead>
                    <tbody>
        `;
        appData.schedule.forEach((row, idx) => {
            html += `
                <tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
                    <td style="padding:8px;"><input value="${row.category}" data-idx="${idx}" data-field="category" class="schedule-input" style="width:100%; padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff;"></td>
                    <td style="padding:8px;"><input value="${row.sat}" data-idx="${idx}" data-field="sat" class="schedule-input" style="width:100%; padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff;"></td>
                    <td style="padding:8px;"><input value="${row.sun}" data-idx="${idx}" data-field="sun" class="schedule-input" style="width:100%; padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff;"></td>
                    <td style="padding:8px;"><input value="${row.tue}" data-idx="${idx}" data-field="tue" class="schedule-input" style="width:100%; padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff;"></td>
                    <td style="padding:8px;"><input value="${row.thu}" data-idx="${idx}" data-field="thu" class="schedule-input" style="width:100%; padding:6px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.3); color:#fff;"></td>
                    <td style="padding:8px; text-align:center;"><button onclick="deleteSchedule(${idx})" style="background:#8B0000; border:none; color:#fff; padding:4px 12px; border-radius:20px; cursor:pointer;">✕</button></td>
                </tr>
            `;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;

        document.querySelectorAll('.schedule-input').forEach(inp => {
            inp.addEventListener('change', function() {

    // ===== التبويبات =====
    function setupTabs() {
        document.querySelectorAll('.section-tabs button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.section-tabs button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const section = this.dataset.section;
                document.querySelectorAll('.section-content').forEach(el => el.classList.remove('active'));
                document.getElementById(`sec-${section}`).classList.add('active');
            });
        });
    }

    // ===== Toast =====
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ===== تسجيل الدخول =====
    function login() {
        const pass = document.getElementById('adminPassword').value;
        const error = document.getElementById('loginError');
        if (pass === appData.settings.adminCode || pass === 'admin2025') {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            renderAll();
            showToast('✅ مرحباً أيها المسؤول');
        } else {
            error.style.display = 'block';
            setTimeout(() => error.style.display = 'none', 3000);
        }
    }

    function logout() {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('adminPassword').value = '';
    }

    // ===== التصيير الكامل =====

        renderSchedule();
        renderTeams();
        renderCoaches();
        renderNews();
        renderGallery();
        loadSettings();
        updateStats();
    }

    // ===== التهيئة =====
    setupTabs();

    // دعم Enter في شاشة الدخول
    document.getElementById('adminPassword').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') login();
    });
